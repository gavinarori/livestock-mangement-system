name: Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, develop]

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  # ─────────────────────────────────────────────
  # DEPLOY PREVIEW
  # ─────────────────────────────────────────────
  deploy-preview:
    name: Deploy preview
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    outputs:
      preview-url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Generate Prisma Client
        run: npx prisma generate


      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment (preview)
        run: |
          vercel pull --yes \
            --environment=preview \
            --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build preview
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy preview
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --meta gitSha=${{ github.sha }} \
            --meta prNumber=${{ github.event.pull_request.number }})
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Preview URL: $URL"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.url }}';
            const sha = '${{ github.sha }}'.substring(0, 7);
            const body = [
              '## Preview Deployment 🌿',
              '',
              `**URL:** ${url}`,
              `**Commit:** \`${sha}\``,
              `**Branch:** \`${{ github.head_ref }}\``,
              '',
              '| Check | Status |',
              '|-------|--------|',
              '| Build | ✅ Passed |',
              '| Preview | ✅ Live |',
              '',
              `> _Last updated: ${new Date().toUTCString()}_`
            ].join('\n');

            // Find existing bot comment to update instead of creating duplicate
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Preview Deployment')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  # ─────────────────────────────────────────────
  # LIGHTHOUSE (performance audit)
  # ─────────────────────────────────────────────
  lighthouse:
    name: Lighthouse audit
    runs-on: ubuntu-latest
    needs: deploy-preview
    permissions:
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Wait for preview to stabilise
        run: sleep 20

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            ${{ needs.deploy-preview.outputs.preview-url }}
            ${{ needs.deploy-preview.outputs.preview-url }}/login
          uploadArtifacts: true
          temporaryPublicStorage: true
          configPath: .lighthouserc.json
        continue-on-error: true   # don't fail PRs on perf regressions, just report

      - name: Post Lighthouse results
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            // Results are in artifacts; just link to the run
            const runUrl = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            const body = `### Lighthouse Report 🔦\n\nPerformance audit complete. [View full report](${runUrl})`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
