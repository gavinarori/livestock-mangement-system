name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"
  workflow_dispatch:
    inputs:
      version:
        description: Version to release (e.g. 1.2.3)
        required: true
      prerelease:
        description: Is this a pre-release?
        type: boolean
        default: false

env:
  NODE_VERSION: "20"

jobs:
  # ─────────────────────────────────────────────
  # VALIDATE TAG
  # ─────────────────────────────────────────────
  validate:
    name: Validate release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      is-prerelease: ${{ steps.version.outputs.is-prerelease }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="v${{ inputs.version }}"
            IS_PRE="${{ inputs.prerelease }}"
          else
            VERSION="${{ github.ref_name }}"
            IS_PRE=$(echo "$VERSION" | grep -qP '\-' && echo "true" || echo "false")
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "is-prerelease=$IS_PRE" >> $GITHUB_OUTPUT
          echo "Releasing $VERSION (prerelease: $IS_PRE)"

      - name: Check package.json version matches tag
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          TAG_VERSION="${{ steps.version.outputs.version }}"
          # Strip prerelease suffix for comparison
          TAG_CLEAN=$(echo "$TAG_VERSION" | sed 's/-.*$//')
          PKG_CLEAN=$(echo "$PKG_VERSION" | sed 's/-.*$//')
          if [ "$PKG_CLEAN" != "$TAG_CLEAN" ]; then
            echo "⚠️  package.json version ($PKG_VERSION) doesn't match tag ($TAG_VERSION)"
            echo "This is a warning, not a blocker — proceeding."
          fi

  # ─────────────────────────────────────────────
  # BUILD RELEASE ARTIFACT
  # ─────────────────────────────────────────────
  build-release:
    name: Build release
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'mongodb://localhost:27017/agrovault' }}

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}

      - name: Create source archive
        run: |
          git archive \
            --format=tar.gz \
            --prefix=agrovault-${{ needs.validate.outputs.version }}/ \
            HEAD \
            -o agrovault-${{ needs.validate.outputs.version }}-source.tar.gz

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ needs.validate.outputs.version }}
          path: |
            agrovault-${{ needs.validate.outputs.version }}-source.tar.gz
          retention-days: 90

  # ─────────────────────────────────────────────
  # GENERATE CHANGELOG & CREATE GITHUB RELEASE
  # ─────────────────────────────────────────────
  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [validate, build-release]
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-${{ needs.validate.outputs.version }}

      - name: Generate changelog from commits
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="${PREV_TAG}..HEAD"
          fi

          # Categorise commits by conventional commit prefix
          FEATURES=$(git log $RANGE --pretty=format:"- %s (%h)" --no-merges | grep -iE "^- feat" || true)
          FIXES=$(git log $RANGE --pretty=format:"- %s (%h)" --no-merges | grep -iE "^- fix" || true)
          PERF=$(git log $RANGE --pretty=format:"- %s (%h)" --no-merges | grep -iE "^- perf" || true)
          BREAKING=$(git log $RANGE --pretty=format:"- %s (%h)" --no-merges | grep -iE "BREAKING" || true)
          OTHER=$(git log $RANGE --pretty=format:"- %s (%h)" --no-merges | grep -vE "^- (feat|fix|perf|chore|ci|docs|test)" || true)

          {
            echo "CHANGELOG<<EOF"
            echo "## What's changed in ${{ needs.validate.outputs.version }}"
            echo ""
            if [ -n "$BREAKING" ]; then
              echo "### ⚠️ Breaking changes"
              echo "$BREAKING"
              echo ""
            fi
            if [ -n "$FEATURES" ]; then
              echo "### ✨ Features"
              echo "$FEATURES"
              echo ""
            fi
            if [ -n "$FIXES" ]; then
              echo "### 🐛 Bug fixes"
              echo "$FIXES"
              echo ""
            fi
            if [ -n "$PERF" ]; then
              echo "### ⚡ Performance"
              echo "$PERF"
              echo ""
            fi
            if [ -n "$OTHER" ]; then
              echo "### 🔧 Other changes"
              echo "$OTHER"
              echo ""
            fi
            echo "**Full changelog:** [$PREV_TAG → ${{ needs.validate.outputs.version }}](${{ github.server_url }}/${{ github.repository }}/compare/${PREV_TAG}...${{ needs.validate.outputs.version }})"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate.outputs.version }}
          name: AgroVault ${{ needs.validate.outputs.version }}
          body: ${{ steps.changelog.outputs.CHANGELOG }}
          prerelease: ${{ needs.validate.outputs.is-prerelease == 'true' }}
          draft: false
          files: |
            agrovault-${{ needs.validate.outputs.version }}-source.tar.gz
          generate_release_notes: false

  # ─────────────────────────────────────────────
  # AUTO-DEPLOY RELEASE TO PRODUCTION
  # ─────────────────────────────────────────────
  deploy-release:
    name: Deploy release to production
    needs: [validate, github-release]
    if: ${{ needs.validate.outputs.is-prerelease == 'false' }}
    uses: ./.github/workflows/deploy.yml
    secrets: inherit
    with:
      environment: production
